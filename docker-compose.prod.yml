# docker-compose.prod.yml — Servidor Hostinger
# Servicios: PostgreSQL + FastAPI
# El Nginx del servidor gestiona el proxy inverso externamente.
#
# Uso:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f api

networks:
  mdm_network:
    driver: bridge
    name: centralizacion_net_prod

volumes:
  postgres_data:
    name: centralizacion_postgres_data_prod

services:

  # ────────────────────────────────────────────────────────────────────────────
  # Base de Datos PostgreSQL 15
  # ────────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: centralizacion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-centralizacion_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - mdm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-centralizacion_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ────────────────────────────────────────────────────────────────────────────
  # API REST — FastAPI / Uvicorn
  # ────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: centralizacion_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-centralizacion_db}
    ports:
      - "8002:8002"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --workers 2
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mdm_network
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; socket.socket().connect((\"127.0.0.1\", 8002))' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
