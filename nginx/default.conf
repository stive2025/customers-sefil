# ── Servidor HTTP (puerto 80) ─────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Oculta la versión de Nginx en cabeceras de respuesta y páginas de error
    server_tokens off;

    # ── Cabeceras de seguridad (Hardening) ────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"           always;
    add_header X-XSS-Protection        "1; mode=block"  always;

    # ── Proxy inverso → FastAPI / Uvicorn ─────────────────────────────────────
    location / {
        proxy_pass         http://api:8002;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout  10s;
        proxy_read_timeout     120s;
        proxy_send_timeout     60s;

        proxy_buffering off;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        default_type text/plain;
        return 503 "Servicio temporalmente no disponible. Intente en unos momentos.\n";
    }
}
