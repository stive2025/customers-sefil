# docker-compose.worker.yml — Servidor Local de Oficina (Linux)
# Servicio: solo el Worker ETL
#
# IMPORTANTE: Este compose requiere un host Linux para que el Worker pueda
# alcanzar las IPs de la red LAN (172.20.1.x). En Windows usar el Worker
# de forma nativa (fuera de Docker) por limitación de Docker Desktop.
#
# El Worker NO necesita PostgreSQL — envía los datos a Hostinger vía HTTP.
#
# Uso:
#   docker compose -f docker-compose.worker.yml up -d --build
#   docker compose -f docker-compose.worker.yml logs -f worker
#
# Forzar sincronización inmediata:
#   docker compose -f docker-compose.worker.yml run --rm worker \
#     python -c "from app.worker.scheduler import run_all_syncs; run_all_syncs()"

services:

  # ────────────────────────────────────────────────────────────────────────────
  # Worker — ETL Scheduler
  # ────────────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: centralizacion_worker
    dns:
      - 8.8.8.8      # DNS de Google
      - 1.1.1.1
    restart: unless-stopped
    env_file: .env.worker
    # Acceso a la red host para alcanzar IPs LAN (172.20.1.x)
    command: python -m app.worker.scheduler
